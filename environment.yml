name: rebot-b601-rs-sim
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - scipy
  - pyyaml
  - mujoco>=3.0
  - pinocchio
  - meshcat-python
  - pytest
  - pip
  - pip:
    # Additional pip-only packages can be listed here.
    # The third-party SDK dependencies are installed from its pyproject.toml
    # by running: pip install -e third_party/reBotArm_control_py

# 避免系统 ROS PYTHONPATH 污染 conda 环境（例如加载旧版 pinocchio）
variables:
  PYTHONPATH: ""
